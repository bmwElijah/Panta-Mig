<script>
 
  // --- Stjärnor bakgrund ---
  const stars = document.getElementById("stars2");
  for(let i=0; i<100; i++){
    const star = document.createElement("div");
    star.className = "star2";
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.width = star.style.height = Math.random() * 3 + "px";
    star.style.animationDuration = 2 + Math.random() * 3 + "s";
    stars.appendChild(star);
  }
</script>

<script>
class Wallet {
  constructor() {
    this.saldo = 0; // startsaldo
  }

  skannaQR(belopp) {
    this.saldo += belopp;
    document.getElementById("meddelande").innerText =
      `Du fick ${belopp} kr för din plastpåse!`;
    this.uppdateraSaldo();
  }

  hämtaPengar() {
    if (this.saldo > 0) {
      alert(`Du får ${this.saldo} kr! 💸`);
      this.saldo = 0;
      this.uppdateraSaldo();
      document.getElementById("meddelande").innerText = "";
    } else {
      alert("Inget saldo att hämta 😅");
    }
  }

  uppdateraSaldo() {
    document.getElementById("saldo").innerText = `Saldo: ${this.saldo} kr`;
  }
}

// Skapa en instans av klassen
const minWallet = new Wallet();
</script>
